# .settings.yaml - Single source of truth for tool versions and quality thresholds.
# Referenced by Makefile and CI workflows.

# Language Versions
languages:
  go: '1.25.0'

# Linting
linting:
  golangci_lint: 'v2.4.0'
  yamllint: '1.38.0'

# Security Tools
security_tools:
  grype: 'v0.107.0'

# Testing Tools
testing_tools:
  kubectl: 'v1.33.0'
  kind: '0.29.0'

# Quality Thresholds
quality:
  coverage_threshold: '70'
  lint_timeout: '5m'
  test_timeout: '5m'

# Build Configuration
build:
  image_registry: 'ghcr.io/mchmarny'
  image_platforms: 'linux/amd64,linux/arm64'

# Testing Configuration
testing:
  kind_k8s_version: '1.33.x'
  kind_worker_count: '2'

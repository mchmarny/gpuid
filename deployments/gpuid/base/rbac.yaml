---
# Cluster-wide - target pods in all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpuid-cluster-view
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]

---
# Bind cluster-wide role to gpuid SA in the gpuid namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpuid-cluster-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpuid-cluster-view
subjects:
  - kind: ServiceAccount
    name: gpuid
    namespace: gpuid

---
# Namespace-scoped: leader election lease in the gpuid namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gpuid-leader-election
  namespace: gpuid
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gpuid-leader-election
  namespace: gpuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gpuid-leader-election
subjects:
  - kind: ServiceAccount
    name: gpuid
    namespace: gpuid

---
name: main

# Thin caller for the reusable qualification workflow. Keeps push/PR
# triggers and concurrency policy in one place; the heavy lifting lives
# in qualification.yaml so release.yaml can reuse the same jobs.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-flight PR runs when a new commit lands; main pushes always
  # complete so the latest commit's coverage report is published.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  qualify:
    uses: ./.github/workflows/qualification.yaml
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    with:
      coverage_report: true
      enforce_coverage: true

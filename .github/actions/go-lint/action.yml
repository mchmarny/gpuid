---
name: 'Go Lint'
description: 'Run go vet, golangci-lint, and yamllint with pinned versions from .settings.yaml'

inputs:
  go_version:
    description: 'Go version to install'
    required: true
  golangci_lint_version:
    description: 'golangci-lint version (e.g. v2.4.0)'
    required: true
  lint_timeout:
    description: 'Lint timeout duration (e.g. 5m)'
    required: false
    default: '5m'

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: ${{ inputs.go_version }}
        cache: true

    - name: Run go vet
      shell: bash
      run: go vet ./...

    - name: Run golangci-lint
      if: hashFiles('.golangci.yaml') != ''
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
      with:
        version: ${{ inputs.golangci_lint_version }}
        args: --timeout=${{ inputs.lint_timeout }}

    - name: Lint YAML
      if: hashFiles('.yamllint') != ''
      shell: bash
      run: |
        # Use pip directly instead of karancode/yamllint-github-action: that
        # action builds its own Dockerfile on every run and has been failing
        # the base-image build on ubuntu-latest. yamllint is a pure-Python
        # package and the version is pinned via .settings.yaml.
        pip install --quiet --no-cache-dir 'yamllint==1.38.0'
        make lint-yaml
